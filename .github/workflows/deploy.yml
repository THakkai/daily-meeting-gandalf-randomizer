name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase Configuration
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          # Replace placeholder values in firebase.js with actual secrets
          sed -i "s/YOUR_API_KEY/$FIREBASE_API_KEY/g" firebase.js
          sed -i "s/YOUR_PROJECT_ID\.firebaseapp\.com/$FIREBASE_AUTH_DOMAIN/g" firebase.js
          sed -i "s/YOUR_PROJECT_ID\.appspot\.com/$FIREBASE_STORAGE_BUCKET/g" firebase.js
          sed -i "s/YOUR_PROJECT_ID/$FIREBASE_PROJECT_ID/g" firebase.js
          sed -i "s/YOUR_MESSAGING_SENDER_ID/$FIREBASE_MESSAGING_SENDER_ID/g" firebase.js
          sed -i "s/YOUR_APP_ID/$FIREBASE_APP_ID/g" firebase.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
